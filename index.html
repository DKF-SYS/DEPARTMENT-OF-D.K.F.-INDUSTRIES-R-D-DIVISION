<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DKF Industries - Vault Terminal System</title>
  <style>
    :root {
      --green: #00ff66;
      --dark-green: #00220d;
      --mid-green: #005522;
      --bg: #030804;
      --panel-bg: #050d07;
      --dim-green: #008833;
      --amber: #ffb000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .terminal-container {
      position: relative;
      width: 95vw;
      max-width: 960px;
      height: 90vh;
      max-height: 700px;
      background-color: var(--panel-bg);
      border: 3px solid var(--green);
      box-shadow: 0 0 25px rgba(0, 255, 102, 0.15);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* CRT Scanlines & Screen Glass */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 15;
    }

    .glass-curvature {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, transparent 60%, rgba(0, 0, 0, 0.65) 100%);
      pointer-events: none;
      z-index: 16;
    }

    /* System Header */
    .header {
      border-bottom: 2px dashed var(--green);
      padding-bottom: 8px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      z-index: 10;
    }

    /* Boot Log View */
    .log-output {
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.4;
      font-size: 0.95rem;
      z-index: 10;
    }

    /* Upgraded GUI Search Engine Interface */
    .gui-view {
      display: none;
      flex: 1;
      flex-direction: column;
      z-index: 10;
    }

    .search-bar-container {
      display: flex;
      align-items: center;
      background: var(--dark-green);
      border: 2px solid var(--green);
      padding: 8px 12px;
      margin-bottom: 15px;
    }

    .search-label {
      font-weight: bold;
      margin-right: 10px;
      color: var(--green);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--green);
      font-family: inherit;
      font-size: 1.1rem;
      outline: none;
    }

    .vault-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      flex: 1;
    }

    .vault-box {
      border: 2px solid var(--dim-green);
      background: rgba(0, 34, 13, 0.3);
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s ease;
    }

    .vault-box.active {
      border-color: var(--green);
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
      background: rgba(0, 51, 20, 0.6);
    }

    .vault-box.alert {
      border-color: var(--amber);
      color: var(--amber);
    }

    .btn-action {
      background: var(--dark-green);
      border: 1px solid var(--green);
      color: var(--green);
      padding: 6px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-action:hover {
      background: var(--green);
      color: var(--bg);
    }

    .hardware-banner {
      background: var(--dark-green);
      border: 1px solid var(--green);
      padding: 8px;
      margin-top: 10px;
      font-size: 0.85rem;
      text-align: center;
      animation: flash 1s infinite alternate;
    }

    @keyframes flash {
      0% { opacity: 0.7; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="terminal-container">
    <div class="glass-curvature"></div>
    <div class="scanlines"></div>

    <div class="header">
      <span>[DKF VAULT OS - SUBTERRANEAN R&amp;D]</span>
      <span id="sys-status">[STATUS: BOOTING]</span>
    </div>

    <!-- Console Log View -->
    <div id="log" class="log-output"></div>

    <!-- Upgraded Search Engine Interface -->
    <div id="gui" class="gui-view">
      <div class="search-bar-container">
        <span class="search-label">ARCHIVE SEARCH:&gt;</span>
        <input type="text" id="search-box" class="search-input" readonly placeholder="Awaiting query...">
      </div>

      <div class="vault-grid" id="vault-display">
        <!-- Dynamic Search Results Rendered Here -->
      </div>

      <div id="notification-area"></div>
    </div>
  </div>

  <script>
    const log = document.getElementById('log');
    const gui = document.getElementById('gui');
    const sysStatus = document.getElementById('sys-status');
    const searchBox = document.getElementById('search-box');
    const vaultDisplay = document.getElementById('vault-display');
    const notificationArea = document.getElementById('notification-area');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep(freq = 800, duration = 0.05) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    // Sequence 1: Boot & Upgrade
    const bootScript = [
      "[INITIALIZING SYSTEM OVERHAUL...]",
      "[DOWNLOADING UPGRADING SYSTEMS PROGRAM... PLEASE WAIT]",
      "....................................................",
      "[INSTALLING HIGH-DEFINITION ARCHIVE SEARCH ENGINE]",
      "[CONFIGURING HARDWARE BUS & PERIPHERAL DETECTION]",
      "[COMPLETE: SWITCHING TO GRAPHICAL INTERFACE]"
    ];

    let scriptIdx = 0;
    function runBoot() {
      if (scriptIdx < bootScript.length) {
        const div = document.createElement('div');
        div.innerText = bootScript[scriptIdx];
        log.appendChild(div);
        playBeep(600, 0.03);
        scriptIdx++;
        setTimeout(runBoot, 800);
      } else {
        setTimeout(switchToGUI, 1200);
      }
    }

    function switchToGUI() {
      log.style.display = 'none';
      gui.style.display = 'flex';
      sysStatus.innerText = '[STATUS: HIGH-DEF SEARCH ACTIVE]';
      startAndyStorySequence();
    }

    // Automated Automated Typing Function
    function typeQuery(text, callback) {
      searchBox.value = '';
      let i = 0;
      const interval = setInterval(() => {
        if (i < text.length) {
          searchBox.value += text[i];
          playBeep(900 + Math.random() * 100, 0.02);
          i++;
        } else {
          clearInterval(interval);
          setTimeout(callback, 600);
        }
      }, 70);
    }

    // Sequence 2: Narrative Search & Vault Progression
    function startAndyStorySequence() {
      // Step A: Search Laser Mouse
      typeQuery("Upgraded Laser Mouse", () => {
        vaultDisplay.innerHTML = `
          <div class="vault-box active">
            <div>
              <h3>[VAULT BOX 04 - OPTICS]</h3>
              <p style="font-size: 0.8rem; margin-top: 6px;">ITEM: Precision Laser Tracking Mouse</p>
              <p style="font-size: 0.8rem; color: var(--green);">STATUS: IN STOCK (LOCATED)</p>
            </div>
            <button class="btn-action" onclick="unlockMouseVault()">ENTER UNLOCK CODE: [7741]</button>
          </div>
        `;
      });
    }

    function unlockMouseVault() {
      playBeep(1200, 0.1);
      vaultDisplay.innerHTML = `<div class="vault-box active"><p>🔓 STORAGE VAULT 04 OPENED. RETRIEVE MOUSE IN REAL TIMELINE.</p></div>`;
      
      setTimeout(() => {
        notificationArea.innerHTML = `<div class="hardware-banner">🖱️ NEW HARDWARE DETECTED: HIGH-PRECISION LASER MOUSE CONNECTED</div>`;
        playBeep(1500, 0.15);
        setTimeout(stepMemoryUpgrade, 2500);
      }, 2000);
    }

    function stepMemoryUpgrade() {
      notificationArea.innerHTML = '';
      typeQuery("Memory Upgrades", () => {
        vaultDisplay.innerHTML = `
          <div class="vault-box active">
            <div>
              <h3>[VAULT BOX 09 - SYSTEM RAM]</h3>
              <p style="font-size: 0.8rem; margin-top: 6px;">ITEM: 128MB High-Density Stasis RAM</p>
              <p style="font-size: 0.8rem; color: var(--green);">STATUS: IN STOCK</p>
            </div>
            <button class="btn-action" onclick="unlockMemoryVault()">ENTER UNLOCK CODE: [3092]</button>
          </div>
        `;
      });
    }

    function unlockMemoryVault() {
      playBeep(1200, 0.1);
      vaultDisplay.innerHTML = `<div class="vault-box active"><p>🔓 STORAGE VAULT 09 OPENED. RETRIEVE RAM MODULE.</p></div>`;
      
      setTimeout(() => {
        notificationArea.innerHTML = `<div class="hardware-banner">💾 HARDWARE NOTIFICATION: UPGRADED MEMORY DETECTED (128MB ACTIVE)</div>`;
        playBeep(1500, 0.15);
        setTimeout(stepBatterySearch, 2500);
      }, 2000);
    }

    function stepBatterySearch() {
      notificationArea.innerHTML = '';
      typeQuery("Battery Charging Unit", () => {
        vaultDisplay.innerHTML = `
          <div class="vault-box alert">
            <div>
              <h3>[VAULT SEARCH RESULTS]</h3>
              <p style="font-size: 0.85rem; margin-top: 8px;">QUERY: Battery Charging Unit</p>
              <p style="font-size: 0.85rem; margin-top: 8px; font-weight: bold;">⚠️ NO UNITS IN STOCK / DEPLETED</p>
            </div>
          </div>
        `;
        setTimeout(stepModemSearch, 2500);
      });
    }

    function stepModemSearch() {
      typeQuery("56k Modem", () => {
        vaultDisplay.innerHTML = `
          <div class="vault-box active">
            <div>
              <h3>[VAULT BOX 12 - COMM HARDWARE]</h3>
              <p style="font-size: 0.8rem; margin-top: 6px;">ITEM: 56k Dial-Up Serial Controller</p>
              <p style="font-size: 0.8rem; color: var(--green);">STATUS: IN STOCK</p>
            </div>
            <button class="btn-action" onclick="connectModem()">ENTER UNLOCK CODE: [5600]</button>
          </div>
        `;
      });
    }

    function connectModem() {
      playBeep(1200, 0.1);
      vaultDisplay.innerHTML = `
        <div class="vault-box alert" style="grid-column: span 2;">
          <h3>⚠️ NETWORK LINK ERROR</h3>
          <p style="font-size: 0.85rem; margin-top: 8px;">INITIALIZING 56K MODEM HARDWARE BUS...</p>
          <p style="font-size: 0.85rem; margin-top: 8px; color: var(--amber);">[LINK UNAVAILABLE: DIGITAL ETHERNET MODEM REQUIRED]</p>
          <hr style="border-color: var(--amber); margin: 10px 0;">
          <p style="font-size: 0.8rem;">PUZZLE: Connect RS-232 Serial Port directly to Mainframe Controller to bypass analog phone check?</p>
          <button class="btn-action" style="border-color: var(--amber); color: var(--amber);" onclick="applyRS232Bypass()">EXECUTE RS-232 SERIAL BRIDGE</button>
        </div>
      `;
    }

    function applyRS232Bypass() {
      playBeep(1800, 0.2);
      vaultDisplay.innerHTML = `
        <div class="vault-box active" style="grid-column: span 2;">
          <h3>✅ NETWORK LINK ESTABLISHED</h3>
          <p style="font-size: 0.85rem; margin-top: 8px;">RS-232 NULL-MODEM BRIDGE ACTIVE.</p>
          <p style="font-size: 0.85rem; margin-top: 8px; color: var(--green);">[56K SERIAL BUS DIRECTLY MAPPED TO ETHERNET CONTROLLER]</p>
          <p style="font-size: 0.8rem; margin-top: 10px;">BUNKER BACKHAUL ONLINE. READY FOR NEXT VAULT COMMAND.</p>
        </div>
      `;
    }

    window.addEventListener('load', runBoot);
  </script>
</body>
</html>
